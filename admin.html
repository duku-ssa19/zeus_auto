<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 60px; }
        .btn { background: #0088cc; color: white; border: none; padding: 20px 40px; border-radius: 12px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Панель администратора</h3>
    <button class="btn" onclick="scan()">СКАНИРОВАТЬ</button>
    <h2 id="res" style="margin-top: 30px; color: #00ff00;"></h2>

    <script>
        const tg = window.Telegram.WebApp;
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
        const pass = "My_Secret_123";

        function scan() {
            tg.showScanQrPopup({ text: "Сканируй QR клиента" }, function(id) {
                document.getElementById('res').innerText = "⏳ Запись...";
                fetch(`${scriptUrl}?id=${id}&pass=${pass}`)
                    .then(r => r.text())
                    .then(t => { 
                        document.getElementById('res').innerText = t;
                        tg.HapticFeedback.notificationOccurred('success');
                    });
                return true; 
            });
        }
    </script>
</body>
</html>
