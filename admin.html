<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 40px; }
        .btn { background: #0088cc; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; width: 100%; }
    </style>
</head>
<body>
    <button class="btn" onclick="scan()">📸 ОТКРЫТЬ СКАНЕР</button>
    <h2 id="res" style="margin-top: 30px;"></h2>
    <script>
        const tg = window.Telegram.WebApp;
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
        const pass = "My_Secret_123";
        function scan() {
            tg.showScanQrPopup({ text: "Сканируй QR клиента" }, (id) => {
                document.getElementById('res').innerText = "⏳ Ждите...";
                fetch(`${scriptUrl}?id=${id}&pass=${pass}`)
                    .then(r => r.text()).then(t => { 
                        document.getElementById('res').innerText = t;
                        tg.HapticFeedback.notificationOccurred('success');
                    });
                return true; 
            });
        }
    </script>
</body>
</html>
