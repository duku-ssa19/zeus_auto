<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #2c69ff; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { display: flex; justify-content: center; width: 100%; margin: 10px 0 40px 0; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 42px; height: 42px; border-radius: 50%; background: url('logo.png') center/cover; }
        .logo-text { font-weight: 900; font-size: 24px; text-transform: uppercase; }
        .logo-text span { color: var(--accent); }
        .card { display: flex; background: var(--card); width: 100%; max-width: 340px; border-radius: 35px; overflow: hidden; height: 170px; box-shadow: 0 15px 35px rgba(44, 105, 255, 0.15); }
        .card-left { background: var(--accent); width: 170px; display: flex; align-items: center; justify-content: center; }
        .card-right { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-num { font-size: 60px; font-weight: 800; line-height: 1; }
        .loading { font-size: 20px; opacity: 0.5; }
        .v-lab { font-size: 11px; color: #8a8a8e; text-transform: uppercase; margin-top: 5px; }
        .btn-scan { display: none; margin-top: 35px; width: 100%; max-width: 340px; padding: 20px; border-radius: 20px; border: none; background: #e63946; color: white; font-weight: 800; }
        .admin-message { color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <div class="logo-img"></div>
            <div class="logo-text">ZEUS<span>AUTO</span></div>
        </div>
    </div>
    <div class="card">
        <div class="card-left"><div id="qrcode"></div></div>
        <div class="card-right">
            <div class="v-num" id="v"><span class="loading">...</span></div>
            <div class="v-lab">визитов</div>
        </div>
    </div>
    <button id="adm" class="btn-scan">СКАНИРОВАТЬ QR</button>

    <script>
        (function() {
            // --------------------------------------------------------------
            // 1. Инициализация Telegram Web App
            // --------------------------------------------------------------
            const tg = window.Telegram.WebApp;
            tg.expand();

            // --------------------------------------------------------------
            // 2. Настройки (должны совпадать с Apps Script)
            // --------------------------------------------------------------
            const ADMIN_IDS = ["797189199"]; // Ваш ID администратора
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
            const ADMIN_PASS = "My_Secret_123";

            // --------------------------------------------------------------
            // 3. Получение ID текущего пользователя
            // --------------------------------------------------------------
            let userId = "";
            try {
                userId = String(tg.initDataUnsafe?.user?.id || "");
            } catch(e) {
                console.error("Ошибка получения userId:", e);
            }

            // Если ID не получен (например, открыто в браузере), показываем предупреждение
            if (!userId) {
                document.body.innerHTML = `
                    <div style="color:white; text-align:center; margin-top:50px;">
                        <h2>Откройте в Telegram</h2>
                        <p>Эта страница работает только внутри бота.</p>
                    </div>
                `;
                return;
            }

            // Определяем, администратор или нет
            const isAdmin = ADMIN_IDS.includes(userId);

            // --------------------------------------------------------------
            // 4. DOM-элементы
            // --------------------------------------------------------------
            const qrContainer = document.getElementById("qrcode");
            const scanButton = document.getElementById("adm");
            const visitsElement = document.getElementById("v");

            // --------------------------------------------------------------
            // 5. Функция загрузки количества визитов (для всех)
            // --------------------------------------------------------------
            function loadVisits() {
                fetch(`${SCRIPT_URL}?action=check&id=${userId}`)
                    .then(response => response.json())
                    .then(data => {
                        visitsElement.innerText = data.visits || 0;
                    })
                    .catch(error => {
                        console.error("Ошибка загрузки визитов:", error);
                        visitsElement.innerText = "?";
                    });
            }
            loadVisits();

            // --------------------------------------------------------------
            // 6. Разделение логики: АДМИН vs КЛИЕНТ
            // --------------------------------------------------------------
            if (isAdmin) {
                // ========== ИНТЕРФЕЙС АДМИНИСТРАТОРА ==========
                // Вместо QR показываем сообщение
                qrContainer.innerHTML = '<div class="admin-message">👑 Режим<br>администратора</div>';
                // Показываем кнопку сканирования
                scanButton.style.display = "block";
                scanButton.onclick = function() {
                    tg.showScanQrPopup({ text: "Наведите камеру на QR-код клиента" }, function(result) {
                        if (!result) {
                            tg.showAlert("❌ Сканирование отменено");
                            return;
                        }
                        // result — это URL, который мы закодировали в QR-коде клиента
                        fetch(result)
                            .then(res => res.text())
                            .then(msg => {
                                tg.showAlert(msg);
                                loadVisits(); // Обновляем счётчик визитов на экране админа
                            })
                            .catch(err => {
                                console.error(err);
                                tg.showAlert("❌ Ошибка сети или сервера");
                            });
                        return true; // Закрыть сканер
                    });
                };
            } else {
                // ========== ИНТЕРФЕЙС ОБЫЧНОГО КЛИЕНТА ==========
                // Прячем кнопку сканера
                scanButton.style.display = "none";
                // Генерируем QR-код с данными для начисления визита
                const qrData = `${SCRIPT_URL}?action=add&id=${userId}&pass=${ADMIN_PASS}`;
                try {
                    new QRCodeStyling({
                        width: 135,
                        height: 135,
                        type: "svg",
                        data: qrData,
                        dotsOptions: { color: "#121214", type: "rounded" },
                        cornersSquareOptions: { type: "extra-rounded", color: "#121214" },
                        backgroundOptions: { color: "transparent" }
                    }).append(qrContainer);
                } catch(e) {
                    console.error("Ошибка создания QR:", e);
                    qrContainer.innerHTML = '<div style="color:white;">Ошибка QR</div>';
                }
            }
        })();
    </script>
</body>
</html>
