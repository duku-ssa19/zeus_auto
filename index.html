<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready(); // Уведомляем ТГ, что приложение готово

    const uid = tg.initDataUnsafe?.user?.id || "797189199";
    const uName = tg.initDataUnsafe?.user?.first_name || "driver";
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";

    document.getElementById('u_name').innerText = uName;

    // Генерируем QR сразу
    new QRCode(document.getElementById("qrcode"), {
        text: `${scriptUrl}?id=${uid}&pass=My_Secret_123`,
        width: 110, height: 110, colorDark: "#000000", colorLight: "#ffffff"
    });

    // Загружаем количество визитов
    fetch(`${scriptUrl}?action=check&id=${uid}`)
        .then(r => r.json())
        .then(data => { document.getElementById('v_count').innerText = data.visits || 0; });

    // --- ЛОГИКА ДЛЯ КНОПКИ СКАНЕРА ---
    const admins = ["797189199"]; // Добавьте сюда ID всех админов
    const adminBtn = document.getElementById('adm_btn');

    if (admins.includes(String(uid))) {
        adminBtn.style.display = 'block';
        
        adminBtn.onclick = function() {
            // Вызываем родной сканер Telegram
            tg.showScanQrPopup({ text: "Сканируйте QR-код клиента" }, function(result) {
                // 'result' — это ссылка из QR-кода клиента
                if (!result) return false;

                // Показываем индикатор загрузки
                adminBtn.innerText = "Обработка...";
                adminBtn.disabled = true;

                // Отправляем запрос на сервер (Google Script)
                fetch(result)
                    .then(response => response.text())
                    .then(text => {
                        tg.showAlert(text); // Показываем результат (например: "Визит засчитан!")
                        location.reload(); // Обновляем страницу, чтобы увидеть изменения
                    })
                    .catch(err => {
                        tg.showAlert("Ошибка при отправке данных");
                    })
                    .finally(() => {
                        adminBtn.innerText = "Сканировать QR";
                        adminBtn.disabled = false;
                        tg.closeScanQrPopup(); // Закрываем сканер
                    });
                
                return true; 
            });
        };
    }
</script>
