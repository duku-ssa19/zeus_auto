<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Auto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f5f5f7; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 260px; }
        #qrcode { margin: 20px auto; }
        h2 { color: #1d1d1f; margin: 0; font-size: 22px; }
        #id_display { margin-top: 15px; font-size: 14px; color: #0071e3; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ZEUS AUTO</h2>
        <div id="qrcode"></div>
        <div id="id_display">Загрузка ID...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция срабатывает через 0.5 сек после открытия
        setTimeout(function() {
            let userId = "797189199"; 

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = String(tg.initDataUnsafe.user.id);
            }

            // Выводим ТОЛЬКО номер ID
            document.getElementById('id_display').innerText = "Ваш ID: " + userId;

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
            const finalUrl = scriptUrl + "?id=" + userId + "&pass=My_Secret_123";

            // Генерируем QR
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: finalUrl,
                width: 200,
                height: 200,
                correctLevel : QRCode.CorrectLevel.L
            });
        }, 500);
    </script>
</body>
</html>
