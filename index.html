<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #eee; }
        .card { background: white; border-radius: 20px; padding: 30px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #id_display { font-weight: bold; color: #0088cc; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ZEUS AUTO</h2>
        <div id="qrcode"></div>
        <div id="id_display">Загрузка ID...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ждем небольшую паузу, чтобы Telegram успел передать данные
        setTimeout(function() {
            let userId = "797189199"; // Ваш ID как запасной для теста

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
            }

            document.getElementById('id_display').innerText = "Ваш ID: " + userId;

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
            const finalUrl = scriptUrl + "?id=" + userId + "&pass=My_Secret_123";

            // Очищаем место под QR и создаем новый
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: finalUrl,
                width: 200,
                height: 200
            });
        }, 500); 
    </script>
</body>
</html>
