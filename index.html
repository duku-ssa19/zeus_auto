<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeus Auto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --card: #1c1c1e; --accent: #b7ff32; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 40px; }
        .logo { font-weight: 800; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .user-tag { background: #2c2c2e; padding: 4px 12px; border-radius: 20px; font-size: 14px; color: #a1a1a1; }

        /* Дизайн карточки как у DriveeCon */
        .card { 
            display: flex; background: var(--card); width: 100%; max-width: 340px; 
            border-radius: 30px; overflow: hidden; height: 160px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .card-left { background: var(--accent); width: 160px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .card-right { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #qrcode img { width: 120px !important; height: 120px !important; }
        .visits-num { font-size: 56px; font-weight: 700; color: var(--text); line-height: 1; }
        .visits-label { font-size: 12px; color: #8a8a8e; text-transform: uppercase; margin-top: 5px; }
        
        .footer-text { margin-top: 30px; color: #8a8a8e; font-size: 14px; text-align: center; }
        .help-link { color: #ff4500; text-decoration: none; font-size: 14px; margin-top: 15px; display: flex; align-items: center; gap: 5px; }

        /* Кнопка внизу */
        .admin-btn { 
            position: fixed; bottom: 20px; width: calc(100% - 40px); max-width: 340px;
            background: #d34329; color: white; border: none; padding: 18px; 
            border-radius: 15px; font-size: 16px; font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZEUS<span>AUTO</span></div>
        <div class="user-tag" id="u_name">user</div>
    </div>

    <div class="card">
        <div class="card-left">
            <div id="qrcode"></div>
        </div>
        <div class="card-right">
            <div class="visits-num" id="v_count">0</div>
            <div class="visits-label">визитов</div>
        </div>
    </div>

    <div class="footer-text">Покажите администратору</div>
    <a href="#" class="help-link"><span>?</span> Что такое баллы?</a>

    <button class="admin-btn" id="adm_btn" style="display:none;">Сканировать QR</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#0b0b0b";

        const uid = tg.initDataUnsafe?.user?.id || "797189199";
        const uName = tg.initDataUnsafe?.user?.username || "driver";
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";

        document.getElementById('u_name').innerText = uName;

        // Мгновенная генерация QR (не дожидаясь ответа сервера)
        new QRCode(document.getElementById("qrcode"), {
            text: `${scriptUrl}?id=${uid}&pass=My_Secret_123`,
            width: 120, height: 120, colorDark: "#000000", colorLight: "#b7ff32",
            correctLevel: QRCode.CorrectLevel.L
        });

        // Загрузка данных о визитах
        fetch(`${scriptUrl}?action=check&id=${uid}`)
            .then(r => r.json())
            .then(data => {
                if(data.registered) {
                    document.getElementById('v_count').innerText = data.visits;
                }
            })
            .catch(e => console.log("Data sync issue"));

        // Кнопка для админов
        const admins = ["797189199"]; // Добавьте ID админов сюда
        if(admins.includes(String(uid))) {
            document.getElementById('adm_btn').style.display = 'block';
        }
    </script>
</body>
</html>
