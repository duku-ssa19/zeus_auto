<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #1c1c1e;
            --accent: #b7ff32;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Шапка с лого */
        .header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 40px;
            margin-top: 10px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-image: url('logo.png');
            background-size: cover;
        }

        .logo-text {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
        }

        .logo-text span { color: var(--accent); }

        /* Карточка */
        .card {
            display: flex;
            background: var(--card);
            width: 100%;
            max-width: 340px;
            border-radius: 30px;
            overflow: hidden;
            height: 160px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card-left {
            background: var(--accent);
            width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Стилизация QR */
        #qrcode {
            padding: 0;
            display: flex;
        }

        #qrcode img {
            width: 125px !important;
            height: 125px !important;
            mix-blend-mode: multiply; /* Магия для вписывания в фон */
        }

        .card-right {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .v-num { font-size: 64px; font-weight: 800; line-height: 1; }
        .v-lab { font-size: 11px; color: #8a8a8e; text-transform: uppercase; margin-top: 5px; }

        .info-link {
            color: #ff4500;
            font-size: 14px;
            margin-top: 25px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-scan {
            display: none;
            margin-top: 35px;
            width: 100%;
            max-width: 340px;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: #d34329;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="logo-img"></div>
            <div class="logo-text">ZEUS<span>AUTO</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-left">
            <div id="qrcode"></div>
        </div>
        <div class="card-right">
            <div class="v-num" id="v">0</div>
            <div class="v-lab">визитов</div>
        </div>
    </div>

    <div class="info-link" onclick="tg.showAlert('Каждая 4-я мойка: скидка\nКаждая 8-я мойка: подарок')">ⓘ Условия программы</div>

    <button id="adm" class="btn-scan">СКАНИРОВАТЬ QR КЛИЕНТА</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const uid = tg.initDataUnsafe?.user?.id || "797189199";
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";

        // Генерация QR (Графитовый на Салатовом)
        new QRCode(document.getElementById("qrcode"), {
            text: `${scriptUrl}?id=${uid}&pass=My_Secret_123`,
            width: 125,
            height: 125,
            colorDark : "#1c1c1e", // Цвет правой части карточки
            colorLight : "#b7ff32", // Цвет левой части карточки
            correctLevel : QRCode.CorrectLevel.M
        });

        fetch(`${scriptUrl}?action=check&id=${uid}`)
            .then(r => r.json())
            .then(d => { document.getElementById('v').innerText = d.visits || 0; });

        // Кнопка для админов
        const admins = ["797189199"]; 
        if(admins.includes(String(uid))) {
            const b = document.getElementById('adm');
            b.style.display = 'block';
            b.onclick = () => {
                tg.showScanQrPopup({text:"Сканирование визита"}, (r) => {
                    fetch(r).then(res => res.text()).then(t => { 
                        tg.showAlert(t); 
                        location.reload(); 
                    });
                    return true;
                });
            };
        }
    </script>
</body>
</html>
