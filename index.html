<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Auto - Карта лояльности</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 280px;
        }
        #qrcode {
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }
        #qrcode img {
            border: 10px solid white;
        }
        h2 { color: #1d1d1f; margin: 0; font-size: 24px; }
        p { color: #86868b; font-size: 14px; margin-top: 10px; }
        #id_display {
            margin-top: 15px;
            font-size: 12px;
            color: #0071e3;
            font-weight: bold;
            background: #eef7ff;
            padding: 5px 10px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ZEUS AUTO</h2>
        <p>Покажите QR администратору</p>
        <div id="qrcode"></div>
        <div id="id_display">Загрузка данных...</div>
    </div>

    <script>
        // 1. Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // 2. Функция генерации (с небольшой задержкой для стабильности)
        setTimeout(function() {
            let userId = "797189199"; // Значение по умолчанию для теста

            // Пробуем взять реальный ID из Telegram
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = String(tg.initDataUnsafe.user.id);
            }

            // Выводим ID на экран для визуальной проверки
            document.getElementById('id_display').innerText = "ID: " + userId;

            // 3. Формируем ссылку для Google Scripts
            const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
            const finalUrl = scriptUrl + "?id=" + userId + "&pass=My_Secret_123";

            // 4. Очищаем контейнер и создаем QR-код
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // Убираем старый QR, если он был
            
            new QRCode(qrContainer, {
                text: finalUrl,
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L // Низкий уровень коррекции для упрощения точек (легче сканировать)
            });
            
            console.log("QR-код создан для URL: " + finalUrl);
        }, 500); // Пауза 0.5 сек
    </script>
</body>

                text: finalUrl,
                width: 200,
                height: 200
            });
        }, 500); 
    </script>
</body>
</html>
