<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Auto - Карта лояльности</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        #qrcode {
            margin-top: 15px;
        }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Zeus Auto</h2>
        <p>Покажите QR-код администратору</p>
        <div id="qrcode"></div>
    </div>

    <script>
        // 1. Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение

        // 2. Получаем ID (если открыто не в TG, будет 12345 для теста)
        const userId = (tg.initDataUnsafe && tg.initDataUnsafe.user) 
                       ? tg.initDataUnsafe.user.id 
                       : "797189199"; 

        // 3. Ваша ссылка на Google Script
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
        
        // 4. Формируем финальную ссылку
        const finalUrl = `${scriptUrl}?id=${userId}&pass=My_Secret_123`;

        // 5. Генерируем QR-код
        new QRCode(document.getElementById("qrcode"), {
            text: finalUrl,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
        
        console.log("QR сгенерирован для ID:", userId);
    </script>
</body>
</html>
