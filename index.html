<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zeus Auto · Карта клиента</title>
  <link rel="stylesheet" href="style.css">
  <!-- Библиотека для стильного QR-кода -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>
  <div class="card">
    <div class="card-content">
      <div class="qr-section">
        <div id="qrcode" class="qr-code"></div>
      </div>
      <div class="info-section">
        <div class="greeting">Zeus Auto</div>
        <div class="visits-label">Количество визитов</div>
        <div class="visits-number" id="v">0</div>
        <div class="hint">Покажите этот код администратору</div>
        <button class="scan-button" id="adm">📷 Сканировать QR</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --------------------------------------------------------------
      // 1. Инициализация Telegram Web App
      // --------------------------------------------------------------
      const tg = window.Telegram.WebApp;
      tg.expand(); // Растягиваем окно на весь экран
      
      // --------------------------------------------------------------
      // 2. Настройки (должны совпадать с Google Apps Script)
      // --------------------------------------------------------------
      const ADMIN_IDS = ["797189199"];                   // ID администраторов
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";
      const ADMIN_PASS = "My_Secret_123";                // Пароль для действия add
      
      // --------------------------------------------------------------
      // 3. Получение ID текущего пользователя Telegram
      // --------------------------------------------------------------
      // Берём ID из объекта initDataUnsafe – он доступен внутри Web App
      const userId = String(tg.initDataUnsafe?.user?.id || "");
      
      // Если userId пустой (например, открыли не в Telegram), показываем предупреждение
      if (!userId) {
        document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40px;'>Ошибка: откройте приложение через Telegram</h2>";
        throw new Error("User ID not found");
      }
      
      // Определяем, является ли пользователь администратором
      const isAdmin = ADMIN_IDS.includes(userId);
      
      // --------------------------------------------------------------
      // 4. DOM-элементы
      // --------------------------------------------------------------
      const qrContainer = document.getElementById("qrcode");
      const scanButton = document.getElementById("adm");
      const visitsElement = document.getElementById("v");
      
      // --------------------------------------------------------------
      // 5. Функция загрузки количества визитов (для всех)
      // --------------------------------------------------------------
      function loadVisits() {
        fetch(`${SCRIPT_URL}?action=check&id=${userId}`)
          .then(response => response.json())
          .then(data => {
            visitsElement.innerText = data.visits || 0;
          })
          .catch(error => {
            console.error("Ошибка загрузки визитов:", error);
            visitsElement.innerText = "?";
          });
      }
      
      // Загружаем визиты сразу при старте
      loadVisits();
      
      // --------------------------------------------------------------
      // 6. Разделение логики: АДМИН vs КЛИЕНТ
      // --------------------------------------------------------------
      if (isAdmin) {
        // ========== ИНТЕРФЕЙС АДМИНИСТРАТОРА ==========
        
        // Очищаем контейнер QR-кода и выводим сообщение, что это режим админа
        qrContainer.innerHTML = `
          <div style="
            display: flex;
            align-items: center;
            justify-content: center;
            width: 135px;
            height: 135px;
            background: #121214;
            border-radius: 24px;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
          ">
            👑 Режим<br>администратора
          </div>
        `;
        
        // Показываем кнопку сканирования
        scanButton.style.display = "block";
        
        // Назначаем действие при клике на кнопку
        scanButton.onclick = function() {
          tg.showScanQrPopup({ text: "Наведите камеру на QR-код клиента" }, function(result) {
            if (!result) {
              tg.showAlert("❌ Сканирование отменено");
              return;
            }
            
            // result — это URL, который мы закодировали в QR-коде клиента
            // Делаем GET-запрос по этому URL (он уже содержит action=add, id и pass)
            fetch(result)
              .then(response => response.text())
              .then(message => {
                tg.showAlert(message);           // Показываем результат (например, "Успешно! Мойка №X")
                loadVisits();                    // Обновляем счётчик визитов (если админ смотрит свою карту)
              })
              .catch(error => {
                console.error("Ошибка при запросе:", error);
                tg.showAlert("❌ Ошибка сети или сервера");
              });
            
            return true; // Закрываем сканер после успешного сканирования
          });
        };
        
      } else {
        // ========== ИНТЕРФЕЙС ОБЫЧНОГО КЛИЕНТА ==========
        
        // Прячем кнопку сканера
        scanButton.style.display = "none";
        
        // Генерируем QR-код с данными для начисления визита
        const qrData = `${SCRIPT_URL}?action=add&id=${userId}&pass=${ADMIN_PASS}`;
        
        // Создаём стильный QR-код
        new QRCodeStyling({
          width: 135,
          height: 135,
          type: "svg",
          data: qrData,
          dotsOptions: { color: "#121214", type: "rounded" },
          cornersSquareOptions: { type: "extra-rounded", color: "#121214" },
          backgroundOptions: { color: "transparent" }
        }).append(qrContainer);
      }
      
      // --------------------------------------------------------------
      // 7. Дополнительно: можно подписаться на событие обновления
      //    извне, но пока не требуется.
      // --------------------------------------------------------------
      
    })();
  </script>
</body>
</html>
