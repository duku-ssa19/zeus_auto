<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0e0e0e; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .loyalty-card { 
            background: #1c1c1e; border-radius: 24px; display: flex; align-items: center; 
            width: 320px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .qr-side { background: #87ff00; padding: 20px; }
        .info-side { flex-grow: 1; text-align: center; }
        .num { font-size: 40px; font-weight: bold; margin: 0; }
        .label { font-size: 10px; color: #8a8a8e; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="app">
        <div class="loyalty-card">
            <div class="qr-side"><div id="qrcode"></div></div>
            <div class="info-side">
                <div class="num" id="v">0</div>
                <div class="label">Визитов</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe?.user?.id || "797189199";
        const url = "https://script.google.com/macros/s/AKfycbwf7b095WKuNxMlWyYpZVUCwF095NabSI9Fn95I-UZdr-FBpWAwJue6e6TI7m3ZvtiJAw/exec";

        fetch(`${url}?id=${uid}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('v').innerText = data.visits || 0;
                new QRCode(document.getElementById("qrcode"), {
                    text: `${url}?id=${uid}&pass=My_Secret_123`,
                    width: 120, height: 120, colorDark: "#000000", colorLight: "#87ff00"
                });
            });
    </script>
</body>
</html>
