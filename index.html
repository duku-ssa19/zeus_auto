<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #qrcode { display: flex; justify-content: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>КАРТА ЛОЯЛЬНОСТИ</h3>
        <div id="qrcode"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        new QRCode(document.getElementById("qrcode"), { text: tg.initDataUnsafe.user.id.toString(), width: 200, height: 200 });
        tg.expand();
    </script>
</body>
</html>
